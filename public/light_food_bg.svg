<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Base warm cream gradient -->
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fdf8f0"/>
      <stop offset="40%"  stop-color="#faf2e4"/>
      <stop offset="75%"  stop-color="#f7ead8"/>
      <stop offset="100%" stop-color="#f9f0e2"/>
    </linearGradient>

    <!-- Soft bokeh radials -->
    <radialGradient id="bokeh1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffe8b0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffe8b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokeh2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffd09a" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#ffd09a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokeh3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c8e6b8" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#c8e6b8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokeh4" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f7c59f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f7c59f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokeh5" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e8f5e0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e8f5e0" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft drop shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#c4956a" flood-opacity="0.12"/>
    </filter>
    <filter id="gentleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#b07a50" flood-opacity="0.10"/>
    </filter>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- ── Base fill ── -->
  <rect width="1440" height="900" fill="url(#base)"/>

  <!-- ── Bokeh light pools ── -->
  <ellipse cx="160"  cy="130" rx="300" ry="240" fill="url(#bokeh1)"/>
  <ellipse cx="1300" cy="100" rx="280" ry="200" fill="url(#bokeh2)"/>
  <ellipse cx="750"  cy="820" rx="340" ry="220" fill="url(#bokeh3)"/>
  <ellipse cx="1150" cy="700" rx="260" ry="200" fill="url(#bokeh4)"/>
  <ellipse cx="300"  cy="750" rx="280" ry="200" fill="url(#bokeh5)"/>
  <ellipse cx="720"  cy="300" rx="200" ry="150" fill="url(#bokeh1)"/>

  <!-- ════════════════════════════════════
       FOOD ILLUSTRATIONS
       ════════════════════════════════════ -->

  <!-- ── Large decorative plate (top-left) ── -->
  <g transform="translate(80, 60) rotate(-15)" filter="url(#softShadow)" opacity="0.22">
    <circle cx="0" cy="0" r="110" fill="#e8d5b8" stroke="#c4a880" stroke-width="3"/>
    <circle cx="0" cy="0" r="90"  fill="#f2e6d0" stroke="#d4b890" stroke-width="1.5"/>
    <!-- salad swirl -->
    <ellipse cx="-18" cy="8"  rx="28" ry="18" fill="#8bc34a" opacity="0.8" transform="rotate(-20,-18,8)"/>
    <ellipse cx="15"  cy="-10" rx="22" ry="14" fill="#aed581" opacity="0.7" transform="rotate(30,15,-10)"/>
    <ellipse cx="10"  cy="22"  rx="20" ry="12" fill="#7cb342" opacity="0.75" transform="rotate(-10,10,22)"/>
    <circle cx="-5"  cy="5"   r="10"  fill="#ef6c00" opacity="0.7"/>
    <circle cx="20"  cy="-5"  r="7"   fill="#ff8f00" opacity="0.65"/>
  </g>

  <!-- ── Herb sprigs scattered (top area) ── -->
  <!-- Basil sprig top-center -->
  <g transform="translate(520, 45) rotate(20)" opacity="0.28" filter="url(#gentleShadow)">
    <line x1="0" y1="60" x2="0" y2="0" stroke="#5d8a3c" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="0"   cy="12" rx="18" ry="12" fill="#7cb342" transform="rotate(-30,0,12)"/>
    <ellipse cx="-14" cy="28" rx="16" ry="10" fill="#8bc34a" transform="rotate(-50,-14,28)"/>
    <ellipse cx="14"  cy="28" rx="16" ry="10" fill="#8bc34a" transform="rotate(50,14,28)"/>
    <ellipse cx="0"   cy="46" rx="14" ry="9"  fill="#7cb342" transform="rotate(-20,0,46)"/>
  </g>

  <!-- Rosemary sprig right -->
  <g transform="translate(1340, 180) rotate(-30)" opacity="0.22">
    <line x1="0" y1="0" x2="0" y2="90" stroke="#5d7a3e" stroke-width="1.8" stroke-linecap="round"/>
    <ellipse cx="-8"  cy="15" rx="10" ry="4" fill="#689f38" transform="rotate(-60,-8,15)"/>
    <ellipse cx="8"   cy="25" rx="10" ry="4" fill="#7cb342" transform="rotate(60,8,25)"/>
    <ellipse cx="-8"  cy="38" rx="10" ry="4" fill="#689f38" transform="rotate(-60,-8,38)"/>
    <ellipse cx="8"   cy="50" rx="10" ry="4" fill="#7cb342" transform="rotate(60,8,50)"/>
    <ellipse cx="-8"  cy="63" rx="10" ry="4" fill="#689f38" transform="rotate(-60,-8,63)"/>
    <ellipse cx="8"   cy="75" rx="10" ry="4" fill="#7cb342" transform="rotate(60,8,75)"/>
  </g>

  <!-- ── Tomato cluster (right side) ── -->
  <g transform="translate(1360, 330)" opacity="0.26" filter="url(#gentleShadow)">
    <circle cx="0"   cy="0"   r="36" fill="#e53935"/>
    <circle cx="-4"  cy="-32" r="4"  fill="#4caf50"/>
    <path d="M-4,-28 Q-14,-18 -6,-8" stroke="#43a047" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M-4,-28 Q4,-16 2,-6"    stroke="#43a047" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="8" cy="-8" rx="14" ry="10" fill="#ef5350" opacity="0.5"/>
    <!-- second tomato -->
    <circle cx="58"  cy="12"  r="28" fill="#e53935"/>
    <circle cx="54"  cy="-16" r="3"  fill="#4caf50"/>
    <path d="M54,-13 Q46,-6 50,4"    stroke="#43a047" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M54,-13 Q62,-5 60,5"    stroke="#43a047" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ── Lemon halves (bottom-left) ── -->
  <g transform="translate(60, 720) rotate(10)" opacity="0.28" filter="url(#gentleShadow)">
    <!-- full lemon -->
    <ellipse cx="0" cy="0" rx="44" ry="36" fill="#fdd835"/>
    <ellipse cx="0" cy="0" rx="40" ry="32" fill="#ffee58"/>
    <!-- cut half -->
    <g transform="translate(80, 10) rotate(-15)">
      <path d="M0,-34 A34,34 0 0,1 0,34 Z" fill="#fff176"/>
      <path d="M0,-34 A34,34 0 0,0 0,34 Z" fill="#fdd835"/>
      <line x1="0" y1="-34" x2="0" y2="34" stroke="#f9a825" stroke-width="1.5"/>
      <!-- segments -->
      <line x1="0" y1="0" x2="-30" y2="-12" stroke="#f9a825" stroke-width="1" opacity="0.6"/>
      <line x1="0" y1="0" x2="-30" y2="12"  stroke="#f9a825" stroke-width="1" opacity="0.6"/>
      <line x1="0" y1="0" x2="-20" y2="-28" stroke="#f9a825" stroke-width="1" opacity="0.6"/>
      <line x1="0" y1="0" x2="-20" y2="28"  stroke="#f9a825" stroke-width="1" opacity="0.6"/>
    </g>
  </g>

  <!-- ── Chili peppers (top-right corner) ── -->
  <g transform="translate(1260, 60)" opacity="0.22">
    <g transform="rotate(-40)">
      <path d="M0,0 Q8,30 4,70" stroke="#c62828" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M0,0 Q-8,30 -4,70" stroke="#e53935" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.4"/>
      <ellipse cx="0" cy="-4" rx="6" ry="5" fill="#4caf50"/>
      <path d="M0,-4 Q12,-16 18,-22" stroke="#4caf50" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <g transform="translate(28, 10) rotate(-10)">
      <path d="M0,0 Q6,28 2,65" stroke="#b71c1c" stroke-width="7" fill="none" stroke-linecap="round"/>
      <ellipse cx="0" cy="-4" rx="5" ry="4" fill="#388e3c"/>
    </g>
  </g>

  <!-- ── Garlic bulb (bottom-right) ── -->
  <g transform="translate(1340, 750) rotate(15)" opacity="0.22" filter="url(#gentleShadow)">
    <!-- cloves -->
    <ellipse cx="0"   cy="-30" rx="18" ry="24" fill="#f5f0e8" stroke="#ddd0b8" stroke-width="1.5"/>
    <ellipse cx="-22" cy="-10" rx="16" ry="22" fill="#f0ebe0" stroke="#d8c8a8" stroke-width="1.5" transform="rotate(-25,-22,-10)"/>
    <ellipse cx="22"  cy="-10" rx="16" ry="22" fill="#f0ebe0" stroke="#d8c8a8" stroke-width="1.5" transform="rotate(25,22,-10)"/>
    <!-- base wrap -->
    <path d="M-30,10 Q0,24 30,10 Q20,40 0,42 Q-20,40 -30,10Z" fill="#e8dcc8" stroke="#c8b898" stroke-width="1.5"/>
    <!-- root lines -->
    <line x1="-8"  cy="43" x2="-12" y2="56" x1="-8"  y1="43" stroke="#b8a888" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0"   y1="43" x2="0"   y2="58"             stroke="#b8a888" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="8"   y1="43" x2="12"  y2="56"             stroke="#b8a888" stroke-width="1.2" stroke-linecap="round"/>
    <!-- sprout -->
    <line x1="0"   y1="-52" x2="0" y2="-70" stroke="#8bc34a" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="0" cy="-74" rx="5" ry="8" fill="#a5d6a7"/>
  </g>

  <!-- ── Carrots (bottom center-left) ── -->
  <g transform="translate(440, 820) rotate(-20)" opacity="0.24">
    <!-- carrot 1 -->
    <path d="M0,0 L-10,60 L10,60 Z" fill="#ff7043"/>
    <path d="M0,0 L-6,30 L6,30 Z"   fill="#ff8a65" opacity="0.5"/>
    <path d="M-2,-8 Q-10,-22 -8,-32" stroke="#4caf50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M0,-8  Q0,-24 2,-36"    stroke="#66bb6a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M2,-8  Q10,-20 14,-30"  stroke="#4caf50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- carrot 2 -->
    <g transform="translate(30, -10) rotate(15)">
      <path d="M0,0 L-9,55 L9,55 Z"  fill="#ef5350"/>
      <path d="M-2,-8 Q-8,-20 -6,-28" stroke="#388e3c" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M0,-8  Q2,-22 4,-32"   stroke="#4caf50" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ── Olive branch (center background) ── -->
  <g transform="translate(680, 120) rotate(30)" opacity="0.16">
    <path d="M0,0 Q60,40 100,20 Q140,0 180,30" stroke="#5d8a3c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="30"  cy="18" rx="14" ry="8" fill="#8bc34a" transform="rotate(40,30,18)"/>
    <ellipse cx="60"  cy="32" rx="13" ry="8" fill="#7cb342" transform="rotate(-30,60,32)"/>
    <ellipse cx="90"  cy="22" rx="14" ry="8" fill="#8bc34a" transform="rotate(20,90,22)"/>
    <ellipse cx="120" cy="14" rx="13" ry="8" fill="#aed581" transform="rotate(-40,120,14)"/>
    <ellipse cx="150" cy="24" rx="14" ry="8" fill="#7cb342" transform="rotate(35,150,24)"/>
    <!-- olives -->
    <ellipse cx="45"  cy="28" rx="7"  ry="10" fill="#5d4037" transform="rotate(20,45,28)"/>
    <ellipse cx="105" cy="18" rx="6"  ry="9"  fill="#4e342e" transform="rotate(-15,105,18)"/>
    <ellipse cx="165" cy="30" rx="7"  ry="10" fill="#5d4037" transform="rotate(30,165,30)"/>
  </g>

  <!-- ── Small herb leaves scattered ── -->
  <!-- coriander / mint dots -->
  <g opacity="0.20">
    <ellipse cx="900"  cy="80"  rx="12" ry="8"  fill="#8bc34a" transform="rotate(20,900,80)"/>
    <ellipse cx="920"  cy="65"  rx="10" ry="7"  fill="#a5d6a7" transform="rotate(-30,920,65)"/>
    <ellipse cx="885"  cy="60"  rx="9"  ry="6"  fill="#7cb342" transform="rotate(45,885,60)"/>

    <ellipse cx="600"  cy="840" rx="14" ry="9"  fill="#aed581" transform="rotate(-20,600,840)"/>
    <ellipse cx="625"  cy="828" rx="11" ry="7"  fill="#8bc34a" transform="rotate(35,625,828)"/>

    <ellipse cx="1100" cy="500" rx="13" ry="8"  fill="#c5e1a5" transform="rotate(25,1100,500)"/>
    <ellipse cx="1120" cy="488" rx="10" ry="7"  fill="#8bc34a" transform="rotate(-40,1120,488)"/>

    <ellipse cx="200"  cy="430" rx="12" ry="8"  fill="#a5d6a7" transform="rotate(15,200,430)"/>
    <ellipse cx="182"  cy="418" rx="10" ry="7"  fill="#7cb342" transform="rotate(-25,182,418)"/>
  </g>

  <!-- ── Spice dots (cumin / pepper seeds) ── -->
  <g opacity="0.18">
    <ellipse cx="750" cy="150" rx="5" ry="3" fill="#795548" transform="rotate(30,750,150)"/>
    <ellipse cx="762" cy="143" rx="4" ry="2" fill="#6d4c41" transform="rotate(-20,762,143)"/>
    <ellipse cx="738" cy="158" rx="4" ry="2" fill="#8d6e63" transform="rotate(50,738,158)"/>

    <ellipse cx="320"  cy="620" rx="5" ry="3" fill="#795548" transform="rotate(-30,320,620)"/>
    <ellipse cx="334"  cy="610" rx="4" ry="2" fill="#6d4c41" transform="rotate(20,334,610)"/>

    <ellipse cx="1080" cy="760" rx="5" ry="3" fill="#8d6e63" transform="rotate(40,1080,760)"/>
    <ellipse cx="1095" cy="750" rx="4" ry="2" fill="#795548" transform="rotate(-15,1095,750)"/>
  </g>

  <!-- ── Decorative plate ring bottom-right ── -->
  <g transform="translate(1360, 860) rotate(10)" opacity="0.18">
    <circle cx="0" cy="0" r="90"  fill="none" stroke="#d4b896" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="75"  fill="none" stroke="#dcc8a8" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="60"  fill="#f5ede0" opacity="0.5"/>
  </g>

  <!-- ── Wooden spoon / ladle silhouette (left center) ── -->
  <g transform="translate(30, 400) rotate(-60)" opacity="0.14">
    <!-- handle -->
    <rect x="-5" y="0" width="10" height="130" rx="5" fill="#a1887f"/>
    <!-- bowl -->
    <ellipse cx="0" cy="-20" rx="28" ry="20" fill="#bcaaa4"/>
    <ellipse cx="0" cy="-20" rx="22" ry="15" fill="#d7ccc8"/>
  </g>

  <!-- ── Subtle dot-grid texture in mid background ── -->
  <g opacity="0.055">
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="2" fill="#a07040"/>
    </pattern>
    <rect width="1440" height="900" fill="url(#dots)"/>
  </g>

  <!-- ── Final soft vignette overlay ── -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="transparent"/>
    <stop offset="100%" stop-color="#f0e0c8" stop-opacity="0.25"/>
  </radialGradient>
  <rect width="1440" height="900" fill="url(#vignette)"/>
</svg>
